<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensajes Recibidos</title>
</head>
<body>
    <h1>Mensajes Recibidos</h1>
    <table border="1" cellpadding="8">
        <tr><th>ID</th><th>Nombre</th><th>Mensaje</th><th>IP</th><th>Fecha</th></tr>
        {% for m in mensajes %}
        <tr>
            <td>{{ m.id }}</td>
            <td>{{ m.nombre|safe }}</td>
            <td>{{ m.mensaje|safe }}</td>
            <td>{{ m.ip }}</td>
            <td>{{ m.fecha }}</td>
        </tr>
        {% endfor %}
    </table>
    <p><a href="/">Volver al inicio</a></p>
</body>
</html>
